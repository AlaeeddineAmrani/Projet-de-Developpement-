<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/css/car.css">
    <link rel="icon" href="/public/img/icon.png">
    <title>Add Car Page</title>
</head>
<body>
    <div class="form">
        <form action="" onclick="" method="post">
            <h1>Enregistrer un Autocar</h1><hr><br>
            <div class="labelinput">
                <label for="capacite">Capacité de l'autocar : </label>
                <input type="number" id="capacite" required>
            </div>
            <div class="labelinput">
                <label for="immatriculation">Immatriculation : </label>
                <input type="text" id="immatriculation" required>
            </div>
            <div class="labelinput">
                <button type="submit" id="btnenvoyer">Enregistrer</button>
            </div>
        </form>
    </div>  
    <script src="/public/js/car.js"></script>  
</body>
</html>
