<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/css/login.css">
    <link rel="icon" href="/public/img/icon.png">
    <title>Login Page</title>
</head>
<body><br><br><br>
    <div class="form">
        <form action="" method="post">
            <h1>Connectez vous</h1><hr><br>
            <div class="labelinput">
                <label for="email">Entrer un email : </label>
                <input type="email" id="email" required>
            </div>
            <div class="labelinput">
                <label for="motdepasse">Entrer un mot de passe : </label>
                <input type="password" id="mot_de_passe" required>
            </div><br>
            <div class="labelinput">
                <button type="submit">Se connecter</button>
            </div>
            <h4 style="text-align: center;">Vous n'avez pas de compte? <a href="/inscription">S'inscrire</a></h4>         
        </form>
    </div>

    <script src="/public/js/login.js"></script>
</body>
</html>
