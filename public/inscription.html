<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/css/inscription.css">
    <link rel="icon" href="/public/img/icon.png">
    <title>Inscription Page</title>
</head>
<body>
    <div class="form">
        <form action="" onclick="" method="post">
            <h1>Inscrivez vous</h1><hr><br>
            <div class="labelinput">
                <label for="nom">Entrer votre nom : </label>
                <input type="text" id="nom" required>
            </div>
            <div class="labelinput">
                <label for="prenom">Entrer votre prénom : </label>
                <input type="text" id="prenom" required>
            </div>
            <div class="labelinput">
                <label for="email">Entrer un email : </label>
                <input type="email" id="email" required>
            </div>
            <div class="labelinput">
                <label for="motdepasse">Entrer un mot de passe : </label>
                <input type="password" id="motdepasse" required>
            </div><br>
            <div class="labelinput">
                <button type="submit" id="btnenvoyer">S'inscrire</button>
            </div>
        </form>
    </div>  
    <script src="/public/js/inscription.js"></script>  
</body>
</html>
